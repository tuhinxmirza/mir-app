<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<h1 id="status">Loading...</h1>
<script>
document.getElementById('status').textContent = 'JS works! tg: ' + (window.Telegram ? 'yes' : 'no');
fetch('https://mir-instant-money.onrender.com/')
  .then(r => r.json())
  .then(d => document.getElementById('status').textContent = 'API OK: ' + JSON.stringify(d))
  .catch(e => document.getElementById('status').textContent = 'API Error: ' + e.message);
</script>
</body>
</html>
